<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pernikahan Andre & Idhi</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #8aa17d, #f3d7dc, #fffaf5);
      color: #333;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero-box {
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 2.5em;
      margin: 0;
      color: #61755a;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #61755a;
      color: white;
      cursor: pointer;
    }

    #opening-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #8aa17d, #f3d7dc);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #main-content {
      display: none;
      padding: 40px;
      text-align: center;
    }

    img {
      width: 250px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<!-- MUSIC -->
<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- OPENING -->
<div id="opening-screen">
  <div class="hero-box">
    <p>Undangan Pernikahan</p>
    <h1>Andre & Idhi</h1>
    <button type="button" class="btn" onclick="openInvitation()">Buka Undangan</button>
  </div>
</div>

<!-- MAIN -->
<div id="main-content">
  <img src="photo.jpg">
  <h1>Andre & Idhi</h1>
  <p>25 Juli 2026 - Brebes</p>
  <p>Terima kasih atas doa dan kehadiran Anda</p>
</div>

<script>
function openInvitation() {
  document.getElementById("opening-screen").style.display = "none";
  document.getElementById("main-content").style.display = "block";

  const music = document.getElementById("bg-music");
  music.volume = 0.6;
  music.play().catch(() => {
    console.log("Autoplay blocked");
  });
}
</script>

</body>
</html>
